<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO27001 取號管理系統</title>
    <style>
        :root {
            --primary-bg: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --border: #dcdde1;
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 0.5rem;
        }

        /* 顯示號碼的區域 */
        .number-display {
            background: #fdfdfd;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        #result {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--danger);
            font-family: 'Courier New', Courier, monospace;
            display: block;
            min-height: 4.5rem;
            line-height: 4.5rem;
        }

        /* 輸入框樣式 */
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            color: var(--text-main);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            height: 1.2rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ISO27001 取號系統</h2>
        <p>請登入帳案以完成文件編號程序</p>
    </div>

    <div class="number-display">
        <span id="result">----</span>
    </div>

    <div class="input-group">
        <label for="account">帳號</label>
        <input type="text" id="account" placeholder="請輸入使用者帳號" autocomplete="username">
    </div>

    <div class="input-group">
        <label for="password">密碼</label>
        <input type="password" id="password" placeholder="請輸入登入密碼" autocomplete="current-password">
    </div>

    <button id="submitBtn" onclick="takeNumber()">執行取號</button>

    <div id="statusMsg" class="status-msg"></div>

    <div class="footer">
        © 2026 IT Infrastructure Security Management
    </div>
</div>

<script>
    // ==========================================
    // ★ 請在下方引號中間貼上您的 GAS 部署網址 ★
    // 注意：絕對不要刪掉頭尾的單引號！
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzAq6yLRogr75LpdYFDfIFY1mMStxwL99eug4AtYRuYJjo0wqxEYohYN-y3y1546II/exec';

    async function takeNumber() {
        const accField = document.getElementById('account');
        const pwdField = document.getElementById('password');
        const btn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const statusMsg = document.getElementById('statusMsg');

        const account = accField.value.trim();
        const password = pwdField.value.trim();

        if (!account || !password) {
            alert("請完整輸入帳號與密碼！");
            return;
        }

        // 按鈕切換為驗證中狀態，防止重複點擊
        btn.disabled = true;
        btn.innerText = "驗證中...";
        resultDiv.innerText = "....";
        statusMsg.innerText = "正在連線至安全性伺服器...";
        statusMsg.style.color = "#7f8c8d";

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify({
                    account: account,
                    password: password
                })
            });

            const data = await response.json();

            if (data.success) {
                // 取號成功
                resultDiv.innerText = data.number;
                statusMsg.innerText = "取號成功！已存入資料庫。";
                statusMsg.style.color = "#27ae60";
                pwdField.value = ""; // 清空密碼框
            } else {
                // 帳號密碼錯誤或其他後端錯誤
                throw new Error(data.error);
            }

        } catch (error) {
            console.error(error);
            resultDiv.innerText = "FAIL";
            statusMsg.innerText = "錯誤: " + error.message;
            statusMsg.style.color = "#e74c3c";
        } finally {
            // 恢復按鈕狀態
            btn.disabled = false;
            btn.innerText = "執行取號";
        }
    }

    // 支援按下 Enter 鍵直接執行
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            takeNumber();
        }
    });
</script>

</body>
</html>
