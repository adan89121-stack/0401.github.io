<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO27001 取號系統</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }

        .system-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 0.5rem;
            display: block;
        }

        #result {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--error-color);
            margin: 1.5rem 0;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 90%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="system-label">Internal Documentation Control</span>
        <h2>ISO27001 取號系統</h2>
        
        <div id="result">----</div>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="請輸入承辦人姓名" autocomplete="off">
        </div>

        <button id="btn" onclick="takeNumber()">立即取號</button>

        <p class="footer-note">系統將自動記錄至後端資料庫</p>
    </div>

    <script>
        // ★ 重點：請在此處替換成你部署 GAS 後得到的 URL ★
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwHaGR54Xijijt_j_pLGwFClxasjaNqHaDiOC9GAdxMjDgdOG8ov3V56ONtX4yqsFQT/exec'; 

        async function takeNumber() {
            const userInput = document.getElementById('userName');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            // 1. 檢查輸入
            const name = userInput.value.trim();
            if (!name) {
                alert("請填寫承辦人姓名，以利稽核追蹤。");
                userInput.focus();
                return;
            }

            // 2. 準備取號狀態
            btn.disabled = true;
            const originalBtnText = btn.innerText;
            btn.innerText = "通訊中...";
            resultDiv.style.color = "#bdc3c7";
            resultDiv.innerText = "WAIT";

            try {
                // 3. 呼叫 GAS API
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 如果遇到跨網域問題可保留，但正常部署建議使用標準 fetch
                    body: JSON.stringify({ userName: name }),
                    headers: {
                        'Content-Type': 'text/plain' // GAS 接收 JSON 時有時用 text/plain 較穩
                    }
                });

                // 注意：由於 Google Redirect 機制，有時 fetch 無法直接取得 json
                // 建議使用以下方式處理
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ userName: name })
                });
                
                const data = await res.json();

                if (data.success) {
                    // 4. 取號成功
                    resultDiv.style.color = "var(--error-color)";
                    resultDiv.innerText = data.number;
                    userInput.value = ""; // 清空輸入框
                    console.log("取號成功：" + data.number);
                } else {
                    throw new Error(data.error);
                }

            } catch (e) {
                console.error(e);
                alert("取號失敗！系統提示：" + e.message);
                resultDiv.innerText = "ERR";
                resultDiv.style.color = "var(--error-color)";
            } finally {
                // 5. 恢復按鈕
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        }

        // 支援按下 Enter 鍵直接取號
        document.getElementById('userName').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                takeNumber();
            }
        });
    </script>
</body>
</html>
